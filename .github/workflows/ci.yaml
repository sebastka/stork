# https://docs.github.com/en/actions/tutorials/publish-packages/publish-docker-images

name: Create and publish a Docker image

on:
  push:
    branches:
      - 'master'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        id: login
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.STORK_CI_TOKEN }}

      - name: Get version from Dockerfile
        id: get_version
        run: |
          # Extracts the value of 'LABEL version=...'
          VERSION=$(grep 'LABEL org.opencontainers.image.version=' Dockerfile | cut -d'=' -f2 | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
